# Single image: root Dockerfile → Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/openalice
# For Olares, terminus-apps/openalice values.yaml points at this repo+tag.
#
# linux/amd64 only: keeps CI reliable and fast (matches typical Olares nodes).
#
# Triggers: pushes to master only (OpenAlice primary branch).
#
# Secrets (Settings → Actions): DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — openalice (Olares)

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build and push openalice
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ format('{0}/openalice', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=openalice-docker
          cache-to: type=gha,mode=max,scope=openalice-docker
