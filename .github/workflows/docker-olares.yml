# Single image: root Dockerfile → Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/openalice
# For Olares, terminus-apps/openalice values.yaml points at this repo+tag.
#
# Bump DOCKER_IMAGE_TAG below when you want a new image on Docker Hub (no latest/sha).
# Multi-platform: linux/amd64, linux/arm64.
#
# Triggers: pushes to master only (OpenAlice primary branch).
#
# Secrets (Settings → Actions): DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — openalice (Olares)

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build and push openalice
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      # Edit this when publishing a new image; workflow pushes only this tag.
      DOCKER_IMAGE_TAG: 0.9.0-beta.13
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/openalice:${{ env.DOCKER_IMAGE_TAG }}
          cache-from: type=gha,scope=openalice-docker
          cache-to: type=gha,mode=max,scope=openalice-docker
